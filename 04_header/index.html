<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background : linear-gradient(90deg, #ee82ee, blue);
            margin: 0;
            padding: 0;
            font-family: Arial;
            min-width: 800px;
        }
        .header{
            background-color: #1a1a1a;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;            
        }
        .header-ul{
            display: flex;
            list-style-type: none;
            color: #fff;
            width: 30%;
            justify-content: space-between;            
        }
        li{
            padding: 3px;
            transform: scaleX(1) scaleY(1);
            transition: transform 0.3s ease-in-out;
        }
        li:hover{
            background-color: #1785a0;
            transform: scaleX(1.2) scaleY(1.2);
        }
        
        a{
            text-decoration: none;
            color: white;
        }
       
        .right{
            display:flex;
            justify-content: space-between;
            gap: 20px;
            width: 40%;
        }
        .submit{
            display: flex;
            width: 4rem;
            height: 1.5rem;
            align-items: center;
            justify-content: center;
            background-color: blue;
            color: white;
            border: 0;
            margin-right: 10px;
            transform: scaleX(1) scaleY(1);
            transition: transform 0.2s ease-in-out;
        }
        .submit:hover{
            background-color: green;
            transform: scaleX(1.2) scaleY(1.2);
        }
         .search{
            border-radius: 15px;
            height: 1.5rem;
            width: 50%;
            min-width: 15rem;
            max-width: 60rem;
            padding: 0px 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <ul class="header-ul">
            <li>
                <a href="#">About</a>
            </li>
            <li>
                <a href="#">Home</a>
            </li>
            <li>
                <a href="#">Contact us</a>
            </li>
        </ul>
        <div class="right">
            <input type="text" name="" id="" class="search" placeholder="Search here">
            <button class="submit"><b>Login</b></button>
        </div>
    </div>
</body>
</html>
