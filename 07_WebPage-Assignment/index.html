<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web-Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background-color: #1a1a1a;
      }
      .carousel,
      .carousel img {
        height: 25vh;
      }
      .content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 40px;
        padding: 100px 0px;
        height: 70vh;
        padding: 0px 35px;
      }
      
      .card{
        background-color: #1a1a1a;
        min-height: 140px;
        min-width: 180px;
        max-height: 360px;
        max-width: 540px;
        transform: scaleX(1) scaleY(1);
        border-radius: 15px;
      }
      .card:hover{
        transform: scaleX(1.2) scaleY(1.2);
        border: 2px solid violet;
      }
      .card button{
        background-color: green;
        border-radius: 0px 0px 15px 15px
      }
      .card a{
        text-decoration: none;
        color: #fff;
        font-weight: bold;
      }
      .card img{
        border-radius: 15px 15px 0px 0px;
        
      }
      .footer{
        color: #fff;
        display: flex;
        justify-content: center;
        height: 100%;
        align-items: bottom;
      }
      h4{
        padding-top: 5px;
        font-size: 14px;
    }

    @media (max-width: 600px){
        .content{
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
        }
    }
    @media (max-width: 1024px) and (min-width: 600px){
        .content{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            height: 100%;
            justify-content: center;
        }
        .card1{
            grid-column: 1/3;
        }
        .card2{
            grid-column: 3/5;
        }
        .card3{
            grid-column: 2/4;
        }
    }
    </style>
  </head>
  <body>
    <div id="carousel" class="carousel slide">
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#carousel"
          data-bs-slide-to="0"
          class="active"
          aria-current="true"
          aria-label="Slide 1"
        ></button>
        <button
          type="button"
          data-bs-target="#carousel"
          data-bs-slide-to="1"
          aria-label="Slide 2"
        ></button>
        <button
          type="button"
          data-bs-target="#carousel"
          data-bs-slide-to="2"
          aria-label="Slide 3"
        ></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src=".\images\15147632-mountainous-5942962_1280.jpg"
            class="d-block w-100"
            alt="..."
          />
        </div>
        <div class="carousel-item">
          <img
            src=".\images\biancamentil-landscape-1192669_1280.jpg"
            class="d-block w-100"
            alt="..."
          />
        </div>
        <div class="carousel-item">
          <img
            src=".\images\nickype-snow-7646952_640.jpg"
            class="d-block w-100"
            alt="..."
          />
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
    <div class="content">
      <div class="card card1">
        <img src=".\images\Mirzapur.jpg" alt="" />
        <button>
          <a href="https://www.youtube.com/watch?v=uBotyv_TSZg" target="_blank"
            >Watch Now</a
          >
        </button>
      </div>
      <div class="card card2">
        <img src=".\images\BMPS.jpg" alt="" />
        <button>
          <a href="https://youtube.com/watch?v=nd-6uApuayg" target="_blank"
            >Watch Now</a
          >
        </button>
      </div>
      <div class="card card3">
        <img src=".\images\Aashish.jpg" alt="" />
        <button>
          <a href="https://www.youtube.com/watch?v=wIM-0ODdlzQ" target="_blank"
            >Watch Now</a
          >
        </button>
      </div>
    </div>
    <div class="footer">
      <h4>&copy</h4>
      <h4>Parshant</h4>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
