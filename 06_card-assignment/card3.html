<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            max-height: 250px;
        }
        .content{
            background-color: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            border-radius: 25px;
        }
        h2,
        h4{
            margin: 0;
            padding: 0;
        }
        .image{
            position: absolute;
            top: 0;
            z-index: 1;
            border-radius: 50%;
        }
        .content{
            background-color: white;
            width: 100%;
            padding-top: 70px;
            margin-top: 60px;
        }
        
    </style>
</head>
<body>
    <div class="card">
        <div class="image">
            <img src=".\images\Card2_people.jpg" alt="" style="height: 100px; width: 100px; border-radius: 50%; border: 8px solid red;">
        </div>
        <div class="content">
            <h2 style="font-size: 1.3rem">Parshant</h2>
            <h4 style="font-size: 0.8rem; font-weight: normal; padding: 4px 0px 4px">Web dev Expert</h4>
            <h4 style="font-size: 0.8rem; font-weight: normal; padding: 4px 0px">70+ Years of experience</h4>
            <img src=".\images\Card3_logo.png" alt="" style="height: 50px; width: 80px">
        </div>
    </div>
</body>
</html>
