<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation Bar Variations</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #1a1a1a;
        color: #fff;
        padding: 25px;
      }

      .nav1 {
        background-color: #fff;
      }

      .nav1 ul {
        list-style-type: none;
        margin: 10px;
        padding: 15px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        font-size: 18px;
      }

      .nav1 a {
        text-decoration: none;
        margin: 10px;
        padding: 15px;
        color: black;
        position: relative;
      }
      .nav1 a::after {
        content: "";
        position: absolute;
        height: 2px;
        width: 100%;
        bottom: 0;
        left: 0;
        background-color: #0a65c7;
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
      }
      .nav1 a:hover::after {
        transform: scaleX(1);
      }
      .nav1 .login-btn {
        background-color: rgb(72, 72, 224);
        color: white;
        border-radius: 5px;
      }

      .nav1 .login-btn:hover {
        background-color: rgb(63, 173, 63);
        transform: scale(1.2);
      }

      .nav2 {
        background-color: rgb(4, 160, 119);
        height: 250px;
        width: 250px;
      }
      .nav2 ul {
        list-style-type: none;
        padding: 20px 20px 0px;
        display: block;
      }
      .nav2 li {
        margin-bottom: 20px;
      }
      .nav2 a {
        text-decoration: none;
        color: white;
        display: block;
        width: 100%;
        height: 30px;
        padding-left: 10px;
        padding-top: 10px;
      }
      .nav2 a:hover {
        background-color: rgb(38, 120, 38);
      }
      .nav2 .login-btn {
        color: #fff;
        background-color: Green;
        display: block;
        border: none;
        margin: 0px auto;
        width: 140px;
        height: 35px;
      }
      .nav3 {
        background-color: white;
      }
      .nav3 ul {
        background-color: rgb(71, 184, 212);
        height: 50px;
        list-style-type: none;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .nav3 a {
        text-decoration: none;
        color: white;
        display: block;
        margin-bottom: 5px;
      }

      .nav3 .dropdown-content {
        display: none;
        background-color: rgb(65, 142, 206);
        width: 100px;
      }
      .nav3 .dropdown:hover .dropdown-content {
        display: block;
        position: absolute;
        padding: 10px;
      }
      .nav3 .dropdown-content a:hover {
        background-color: #8e8989;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="nav-container">
      <h2>Variation 1: Horizontal with underline effect</h2>
      <nav class="nav1">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
          <li><button class="login-btn">Login</button></li>
        </ul>
      </nav>
    </div>

    <div class="nav-container">
      <h2>Variation 2: Vertical with hover effect</h2>
      <nav class="nav2">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
        </ul>
        <button class="login-btn">Login</button>
      </nav>
    </div>

    <div class="nav-container">
      <h2>Variation 3: Horizontal with dropdown</h2>
      <nav class="nav3">
        <ul>
          <li><a href="#">Home</a></li>
          <li class="dropdown">
            <a href="#">About</a>
            <div class="dropdown-content">
              <a href="#">Our Story</a>
              <a href="#">Team</a>
              <a href="#">Contact</a>
            </div>
          </li>
          <li><a href="#">Products</a></li>
          <li><button class="login-btn">Login</button></li>
        </ul>
      </nav>
    </div>
  </body>
</html>
