<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-Color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-Color: #b7b2b2;
            border-radius: 4px;
            padding: 30px;
            width: 300px;
            
        }
        h2{
            color: rgb(142, 78, 9);
            text-align: center;
            margin-bottom: 40px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 4px;
            border-color: #c28270;
            background-color: #2f1f1f;
        }
        button {
            background-color: rgb(64, 64, 194);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        button:hover {
            background-color: rgb(0, 0, 97) ;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
