<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: #1a1a1a;
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 5px;
            margin: 10px;
            max-width: 410px;
            max-height: 410px;
        }
        .item{
            margin: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .item1{
            grid-row: 1/3;
            grid-column: 1/3;
        }
        .item10{
            grid-row: 3/5;
            grid-column: 3/5;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="item item1" style="background-color: orange;">1</h2>
        <h2 class="item item2" style="background-color: red;">2</h2>
        <h2 class="item item3" style="background-color: yellow;">3</h2>
        <h2 class="item item4" style="background-color: green;">4</h2>
        <h2 class="item item5" style="background-color: blue;">5</h2>
        <h2 class="item item6" style="background-color: purple;">6</h2>
        <h2 class="item item7" style="background-color: pink;">7</h2>
        <h2 class="item item8" style="background-color: #00ffc8;">8</h2>
        <h2 class="item item9" style="background-color: rgb(0, 255, 119);">9</h2>
        <h2 class="item item10" style="background-color: rgb(0, 229, 255);">10</h2>
    </div>
</body>
</html>
