<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <link rel="stylesheet" href="./output.css" />
    <style>
      .Drop_list {
        display: none;
      }
      .About_us:hover .Drop_list {
        display: block;
        position: absolute;
        margin-top: 10px;
        padding: 8px;
      }
    </style>
  </head>
  <body class="bg-gray-600">
    <div
      class="header absolute bg-gray-800 text-white flex justify-between w-screen items-center"
    >
      <div class="md:min-w-sm pt-2">
        <ul
          class="Nav_header flex justify-between my-2 px-4 h-full gap-10 text-l whitespace-nowrap"
        >
          <li class="hover:cursor-pointer">Home</li>
          <li class="About_us hover:cursor-pointer">
            About Us
            <ul class="Drop_list bg-gray-800">
              <li class="hover:bg-gray-500 p-2">Story</li>
              <li class="hover:bg-gray-500 p-2">Location</li>
              <li class="hover:bg-gray-500 p-2">About webpage</li>
            </ul>
          </li>
          <li class="hover:cursor-pointer">Contact Us</li>
        </ul>
      </div>
      <div class="md:w-full flex justify-end md:pr-20">
        <input
          type="text"
          name=""
          id=""
          placeholder="Search here"
          class="border-2 border-gray-600 rounded-xl px-4 bg-gray-700 text-white outline-none m-4 focus:ring-2 focus:ring-blue-500 focus:border-none min-w-50 max-w-full w-65"
        />
      </div>
      <div class="flex">
        <button
          class="bg-blue-600 px-4 my-2 mx-2 h-10 font-medium rounded-xl text-sm hover:bg-blue-800"
        >
          Login
        </button>
        <button
          class="bg-green-800 px-4 my-2 mx-2 h-10 font-medium rounded-xl text-sm hover:bg-green-900"
        >
          SignUp
        </button>
      </div>
    </div>
  </body>
</html>
